seed: 1337

data:
  csv_path: data/crops.csv
  image_size: 224
  train_split: train
  val_split: val
  countries: null
  allowed_labels: [D00, D10, D20, D40]

model:
  name: resnet18
  pretrained: true
  freeze_backbone: false

train:
  epochs: 15
  batch_size: 64
  num_workers: 4
  optimizer: adamw
  lr: 0.0001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_patience: 5

outputs:
  root_dir: outputs/resnet18_finetune
  checkpoints_dir: outputs/resnet18_finetune/checkpoints
  logs_dir: outputs/resnet18_finetune/logs
  figures_dir: outputs/resnet18_finetune/figures
  label_map_path: outputs/resnet18_finetune/label_map.json
  best_checkpoint_name: best.pt
  history_name: history.json